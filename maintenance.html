<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance Mode</title>

<style>
body{
margin:0;
background:#111827;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.box{
width:90%;
max-width:420px;
background:#1f2937;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 25px rgba(0,255,255,.3);
}

h1{
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:10px;
cursor:pointer;
}

#onBtn{
background:#16a34a;
color:#fff;
}

#offBtn{
background:#dc2626;
color:#fff;
}

#status{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#00ff99;
}
</style>

</head>

<body>

<div class="box">

<h1>🛠 Maintenance Mode</h1>

<button id="onBtn">
Turn ON
</button>

<button id="offBtn">
Turn OFF
</button>

<div id="status">
Current Status : OFF
</div>

</div>

<script type="module" src="js/maintenance.js"></script>
<script>
document.getElementById("onBtn").onclick = () => {
    alert("ON Button Works");
};

document.getElementById("offBtn").onclick = () => {
    alert("OFF Button Works");
};
  </script>
</body>
</html>
