<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Player Management</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d1117;
color:#fff;
}

header{
background:#161b22;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
color:#FFD700;
margin:0;
}

.back-btn{
background:#FFD700;
color:#000;
padding:10px 18px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.container{
width:90%;
max-width:900px;
margin:25px auto;
}

.card{
background:#161b22;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#FFD700;
color:#000;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.player-card{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.player-card h3{
margin:0;
color:#FFD700;
}

.action-btn{
margin-top:10px;
display:flex;
gap:10px;
}

.edit{
background:#0ea5e9;
color:#fff;
}

.delete{
background:#ef4444;
color:#fff;
}
</style>

</head>

<body>

<header>
<h2>Admin Player Management</h2>
<a href="dashboard.html" class="back-btn">⬅ Dashboard</a>
</header>

<div class="container">

<div class="card">

<input type="text" id="playerName" placeholder="Player Name">

<input type="number" id="jersey" placeholder="Jersey Number">

<select id="position">
<option value="">Select Position</option>
<option>GK</option>
<option>DF</option>
<option>MF</option>
<option>FW</option>
</select>

<select id="team">
<option value="">Select Team</option>
</select>

<button id="addPlayerBtn">Add Player</button>

</div>

<div id="playerList"></div>

</div>

<script type="module" src="js/admin-players.js"></script>

</body>
</html>
