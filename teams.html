<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Management</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
width:90%;
max-width:1000px;
margin:30px auto;
}

h2{
color:#FFD700;
margin-bottom:20px;
}

.form{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.form input{
flex:1;
min-width:220px;
padding:12px;
border:none;
border-radius:8px;
}

.form button{
padding:12px 20px;
background:#FFD700;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:#161b22;
}

th,td{
padding:14px;
border:1px solid #30363d;
text-align:center;
}

th{
background:#222b36;
color:#FFD700;
}

.action{
cursor:pointer;
color:#ff4d4d;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Team Management</h2>

<div class="form">
<h1>Teams</h1>

<table border="1" width="100%">
    <thead>
        <tr>
            <th>#</th>
            <th>Team Name</th>
        </tr>
    </thead>

    <tbody id="teamList">
    </tbody>

</table>

</div>

<table>

<thead>

<tr>

<th>#</th>

<th>Team Name</th>

<th>Delete</th>

</tr>

</thead>

<tbody id="teamList">

</tbody>

</table>

</div>

<script type="module" src="js/teams.js"></script>

</body>
</html>
