<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Team Management</title>

<style>

body{
margin:0;
background:#0d1117;
font-family:Arial,sans-serif;
color:white;
}

header{
background:#161b22;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h2{
margin:0;
color:#FFD700;
}

.back-btn{
background:#FFD700;
color:#000;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.container{
width:90%;
max-width:900px;
margin:25px auto;
}

.card{
background:#161b22;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#FFD700;
color:#000;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.team-card{
background:#1f2937;
padding:15px;
border-radius:10px;
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.delete-btn{
background:#ef4444;
color:#fff;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h2>Admin Team Management</h2>

<a href="dashboard.html" class="back-btn">
⬅ Dashboard
</a>

</header>

<div class="container">

<div class="card">

<input
type="text"
id="teamName"
placeholder="Team Name">

<button id="addTeamBtn">
Add Team
</button>

</div>

<div id="teamList"></div>

</div>

<script type="module" src="js/admin-teams.js"></script>

</body>
</html>
