<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Match Result</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
max-width:1100px;
margin:30px auto;
padding:20px;
}

h2{
color:#FFD700;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border:1px solid #333;
text-align:center;
}

th{
background:#161b22;
color:#FFD700;
}

input{
width:60px;
padding:8px;
border-radius:5px;
border:none;
text-align:center;
}

button{
padding:8px 15px;
background:#FFD700;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>


<body>


<div class="container">

<h2>Match Result Update</h2>


<table>

<thead>

<tr>

<th>Group</th>

<th>Home</th>

<th>Score</th>

<th>Away</th>

<th>Score</th>

<th>Update</th>

</tr>

</thead>


<tbody id="resultList">

</tbody>


</table>


</div>


<script type="module" src="js/results.js"></script>


</body>

</html>
